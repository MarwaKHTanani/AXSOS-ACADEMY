<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Card</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div class="bg-blue"></div>
        <div class="info">
          <img
            src="./assets/user-circle.png"
            alt="user photo"
            class="user-photo"
          />
          <h2>John Doe</h2>
          <div class="location">
            <img
              src="./assets/map-marker.png"
              alt="address icon"
              class="address"
            />
            <span>Seattle</span>
          </div>
          <p>Developer | Engineer | Problem Solver</p>
          <p>Master of shadows and the Internet!</p>

          <a href="#"
            ><img class="gear" src="./assets/gear.png" />Edit Profile</a
          >
        </div>
      </div>
    </div>
  </body>
</html>
